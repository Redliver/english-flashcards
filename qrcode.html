<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语卡片 - 海报二维码</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 卡通风格渐变背景 */
        body {
            font-family: "Ma Shan Zheng", "PingFang SC", cursive;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f4f8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 卡片容器（相对定位，承载底层装饰） */
        .poster-container {
            background: linear-gradient(180deg, #ffffff 0%, #fef7fb 100%);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 
                0 12px 30px rgba(255, 158, 175, 0.1),
                0 4px 15px rgba(130, 195, 236, 0.08);
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative; /* 作为子元素定位参考 */
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden; /* 防止装饰元素超出卡片 */
        }

        /* 底层几何形状装饰（最下层，简约美观） */
        .geo-decoration {
            position: absolute;
            z-index: 0; /* 最低层级，不遮挡任何内容 */
            opacity: 0.25; /* 透明度适中，不抢镜 */
            border: 3px dashed; /* 虚线描边 */
        }

        /* 左上角圆形+三角形组合 */
        .geo-1 {
            top: 15%;
            left: 8%;
            width: 60px;
            height: 60px;
            border-radius: 50%; /* 圆形 */
            border-color: #ff6b8b; /* 粉色系 */
        }
        .geo-1::after {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            width: 20px;
            height: 20px;
            /* 三角形 */
            border: 10px solid transparent;
            border-bottom-color: #ff6b8b;
        }

        /* 右上角正方形+小圆组合 */
        .geo-2 {
            top: 20%;
            right: 8%;
            width: 50px;
            height: 50px;
            border-radius: 8px; /* 圆角正方形 */
            border-color: #2563eb; /* 蓝色系 */
        }
        .geo-2::after {
            content: "";
            position: absolute;
            top: 15px;
            left: 15px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #2563eb;
            opacity: 0.5;
        }


        /* 右下角梯形组合（基于矩形变形） */
        .geo-4 {
            bottom: 15%;
            right: 8%;
            width: 55px;
            height: 55px;
            border-color: #ff9500; /* 橙色系（呼应标题） */
            /* 梯形效果 */
            clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%);
        }

        /* 卡片顶部装饰条（粉蓝渐变） */
        .poster-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #ff9eaf, #82c3ec);
            border-radius: 24px 24px 0 0;
            z-index: 1;
        }

        /* 卡通标题样式 */
        .poster-title {
            font-size: 36px;
            font-weight: 600;
            background: linear-gradient(90deg, #ff6b8b, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-shadow: 0 3px 6px rgba(255, 107, 139, 0.15);
            position: relative;
            padding-bottom: 20px;
            z-index: 2; /* 高于装饰 */
        }

        /* 标题分割线 */
        .poster-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, #ff9eaf, #82c3ec);
            border-radius: 2px;
            z-index: 2;
        }

        /* 二维码容器 */
        .qrcode {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            background: rgba(240, 253, 244, 0.8);
            padding: 12px;
            border-radius: 16px;
            border: 1px dashed rgba(7, 193, 96, 0.2);
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.02),
                0 6px 15px rgba(7, 193, 96, 0.08);
            position: relative;
            z-index: 2; /* 高于装饰 */
        }

        /* 提示文字 */
        .tip-text {
            margin-top: 25px;
            font-size: 16px;
            background: linear-gradient(90deg, #2563eb, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            line-height: 1.6;
            font-family: "Comic Sans MS", "Ma Shan Zheng", sans-serif;
            position: relative;
            z-index: 2;
        }

        /* 底部小字 */
        .sub-text {
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
            opacity: 0.9;
            font-family: "PingFang SC", sans-serif;
            position: relative;
            z-index: 2;
        }
    </style>
    <!-- 引入卡通字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poster-container">


        <!-- 核心内容（上层） -->
        <h1 class="poster-title">英语卡片</h1>
        <div id="qrcode" class="qrcode"></div>
        <p class="tip-text">✨ 扫码解锁英语卡片 ✨</p>
        <p class="sub-text">微信扫码 · 趣味学习</p>
    </div>

    <!-- 二维码生成库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        window.onload = function() {
            const qrCodeUrl = 'http://192.168.50.232:12345/';
            new QRCode(document.getElementById('qrcode'), {
                text: qrCodeUrl,
                width: 256,
                height: 256,
                colorDark: "#07c160",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    </script>
</body>
</html>
