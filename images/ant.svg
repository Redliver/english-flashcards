<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 蚂蚁身体 - 三段式 -->
  <ellipse cx="100" cy="85" rx="20" ry="15" fill="#8B4513"/>
  <ellipse cx="75" cy="90" rx="15" ry="12" fill="#8B4513"/>
  <ellipse cx="125" cy="90" rx="15" ry="12" fill="#8B4513"/>

  <!-- 蚂蚁头 -->
  <circle cx="100" cy="55" r="18" fill="#8B4513"/>

  <!-- 蚂蚁眼睛 -->
  <circle cx="95" cy="52" r="4" fill="white"/>
  <circle cx="105" cy="52" r="4" fill="white"/>
  <circle cx="96" cy="52" r="2" fill="black"/>
  <circle cx="106" cy="52" r="2" fill="black"/>

  <!-- 蚂蚁触角 -->
  <line x1="92" y1="40" x2="85" y2="25" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="40" x2="115" y2="25" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <circle cx="85" cy="25" r="3" fill="#8B4513"/>
  <circle cx="115" cy="25" r="3" fill="#8B4513"/>

  <!-- 蚂蚁腿 -->
  <line x1="85" y1="80" x2="70" y2="100" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="75" x2="100" y2="105" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="80" x2="130" y2="100" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="95" x2="75" y2="115" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="115" y1="95" x2="125" y2="115" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>

  <!-- 地面小草 -->
  <path d="M 60 130 L 65 120" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
  <path d="M 140 130 L 135 120" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
</svg>
