<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#F4A460"/>
 <ellipse cx="100" cy="140" rx="90" ry="10" fill="#DEB887"/>

 <!-- 斑马身体 -->
 <ellipse cx="100" cy="90" rx="50" ry="35" fill="white"/>

 <!-- 斑马条纹 -->
 <path d="M60,60 Q70,70 60,90 Q55,110 65,125" stroke="#333" stroke-width="4" fill="none"/>
 <path d="M80,55 Q90,75 80,100 Q75,120 85,135" stroke="#333" stroke-width="4" fill="none"/>
 <path d="M100,55 Q110,75 100,100 Q95,120 105,135" stroke="#333" stroke-width="4" fill="none"/>
 <path d="M120,55 Q130,75 120,100 Q115,120 125,135" stroke="#333" stroke-width="4" fill="none"/>
 <path d="M140,60 Q150,70 140,90 Q135,110 145,125" stroke="#333" stroke-width="4" fill="none"/>

 <!-- 斑马脖子 -->
 <path d="M135,70 Q160,50 165,30" stroke="white" stroke-width="25" fill="none"/>
 <path d="M150,50 Q160,45 155,60" stroke="#333" stroke-width="3" fill="none"/>
 <path d="M160,40 Q165,50 160,65" stroke="#333" stroke-width="3" fill="none"/>

 <!-- 斑马头 -->
 <ellipse cx="170" cy="30" rx="22" ry="18" fill="white"/>

 <!-- 斑马耳朵 -->
 <ellipse cx="155" cy="15" rx="8" ry="12" fill="white" transform="rotate(-20, 155, 15)"/>
 <ellipse cx="185" cy="18" rx="8" ry="12" fill="white" transform="rotate(20, 185, 18)"/>
 <ellipse cx="155" cy="15" rx="4" ry="8" fill="#FFC0CB" transform="rotate(-20, 155, 15)"/>
 <ellipse cx="185" cy="18" rx="4" ry="8" fill="#FFC0CB" transform="rotate(20, 185, 18)"/>

 <!-- 斑马脸部条纹 -->
 <path d="M160,20 Q170,25 165,35" stroke="#333" stroke-width="2" fill="none"/>
 <path d="M175,22 Q180,30 175,40" stroke="#333" stroke-width="2" fill="none"/>

 <!-- 斑马眼睛 -->
 <circle cx="178" cy="28" r="5" fill="white"/>
 <circle cx="180" cy="28" r="3" fill="#333"/>
 <circle cx="181" cy="26" r="1" fill="white"/>

 <!-- 斑马鼻子 -->
 <ellipse cx="190" cy="38" rx="6" ry="5" fill="#333"/>

 <!-- 斑马鬃毛 -->
 <path d="M150,30 Q145,40 150,50" stroke="#333" stroke-width="4"/>
 <path d="M155,28 Q150,38 155,48" stroke="#333" stroke-width="4"/>
 <path d="M160,30 Q155,40 160,50" stroke="#333" stroke-width="4"/>

 <!-- 斑马腿 -->
 <rect x="60" y="115" width="10" height="25" rx="4" fill="white"/>
 <rect x="80" y="115" width="10" height="25" rx="4" fill="white"/>
 <rect x="110" y="115" width="10" height="25" rx="4" fill="white"/>
 <rect x="130" y="115" width="10" height="25" rx="4" fill="white"/>

 <!-- 斑马腿条纹 -->
 <rect x="60" y="120" width="10" height="3" fill="#333"/>
 <rect x="60" y="128" width="10" height="3" fill="#333"/>
 <rect x="80" y="120" width="10" height="3" fill="#333"/>
 <rect x="80" y="128" width="10" height="3" fill="#333"/>
 <rect x="110" y="120" width="10" height="3" fill="#333"/>
 <rect x="110" y="128" width="10" height="3" fill="#333"/>
 <rect x="130" y="120" width="10" height="3" fill="#333"/>
 <rect x="130" y="128" width="10" height="3" fill="#333"/>
</svg>