<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 斑马身体 -->
  <ellipse cx="100" cy="90" rx="45" ry="30" fill="white"/>

  <!-- 斑马粗条纹 - 更明显的黑白条纹 -->
  <path d="M 65 65 Q 75 90 65 115" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 85 60 Q 95 90 85 120" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 105 60 Q 115 90 105 120" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 125 65 Q 135 90 125 115" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- 斑马脖子 -->
  <rect x="130" y="55" width="25" height="40" rx="8" fill="white" transform="rotate(20 130 75)"/>
  <line x1="138" y1="55" x2="145" y2="85" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="50" x2="155" y2="80" stroke="#000000" stroke-width="5" stroke-linecap="round"/>

  <!-- 斑马头 -->
  <ellipse cx="155" cy="45" rx="22" ry="18" fill="white"/>

  <!-- 头部条纹 -->
  <line x1="145" y1="35" x2="148" y2="55" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="30" x2="158" y2="55" stroke="#000000" stroke-width="4" stroke-linecap="round"/>

  <!-- 马鬃 -->
  <path d="M 135 35 L 132 20" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <path d="M 142 32 L 140 18" stroke="#000000" stroke-width="5" stroke-linecap="round"/>
  <path d="M 150 30 L 150 15" stroke="#000000" stroke-width="5" stroke-linecap="round"/>

  <!-- 耳朵 -->
  <ellipse cx="140" cy="25" rx="6" ry="10" fill="white" transform="rotate(-30 140 25)"/>
  <ellipse cx="170" cy="28" rx="6" ry="10" fill="white" transform="rotate(30 170 28)"/>
  <ellipse cx="140" cy="25" rx="3" ry="6" fill="#FFC0CB" transform="rotate(-30 140 25)"/>
  <ellipse cx="170" cy="28" rx="3" ry="6" fill="#FFC0CB" transform="rotate(30 170 28)"/>

  <!-- 眼睛 -->
  <circle cx="150" cy="42" r="5" fill="black"/>
  <circle cx="151" cy="41" r="2" fill="white"/>

  <!-- 鼻子 -->
  <ellipse cx="172" cy="48" rx="6" ry="5" fill="#333"/>

  <!-- 腿 -->
  <rect x="70" y="115" width="10" height="20" rx="3" fill="white"/>
  <rect x="90" y="115" width="10" height="20" rx="3" fill="white"/>
  <rect x="110" y="115" width="10" height="20" rx="3" fill="white"/>
  <rect x="125" y="115" width="10" height="20" rx="3" fill="white"/>

  <!-- 腿部条纹 -->
  <rect x="70" y="120" width="10" height="4" fill="#000000"/>
  <rect x="70" y="128" width="10" height="4" fill="#000000"/>
  <rect x="90" y="120" width="10" height="4" fill="#000000"/>
  <rect x="90" y="128" width="10" height="4" fill="#000000"/>
  <rect x="110" y="120" width="10" height="4" fill="#000000"/>
  <rect x="110" y="128" width="10" height="4" fill="#000000"/>
  <rect x="125" y="120" width="10" height="4" fill="#000000"/>
  <rect x="125" y="128" width="10" height="4" fill="#000000"/>

  <!-- 尾巴 -->
  <path d="M 55 85 Q 40 80 42 100" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="42" cy="105" rx="4" ry="8" fill="#000000"/>
</svg>
