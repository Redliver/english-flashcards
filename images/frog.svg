<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 荷叶 -->
  <ellipse cx="100" cy="125" rx="70" ry="15" fill="#228B22"/>
  <path d="M 100 125 L 100 110" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>

  <!-- 青蛙身体 -->
  <ellipse cx="100" cy="85" rx="40" ry="30" fill="#32CD32"/>

  <!-- 青蛙头 -->
  <ellipse cx="100" cy="55" rx="35" ry="25" fill="#32CD32"/>

  <!-- 青蛙眼睛 -->
  <circle cx="85" cy="40" r="12" fill="#32CD32"/>
  <circle cx="115" cy="40" r="12" fill="#32CD32"/>
  <circle cx="85" cy="38" r="8" fill="white"/>
  <circle cx="115" cy="38" r="8" fill="white"/>
  <circle cx="85" cy="38" r="4" fill="black"/>
  <circle cx="115" cy="38" r="4" fill="black"/>
  <circle cx="86" cy="36" r="1.5" fill="white"/>
  <circle cx="116" cy="36" r="1.5" fill="white"/>

  <!-- 青蛙嘴巴 -->
  <path d="M 85 65 Q 100 75 115 65" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 青蛙腮红 -->
  <ellipse cx="75" cy="60" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="125" cy="60" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>

  <!-- 青蛙腿 -->
  <ellipse cx="65" cy="95" rx="12" ry="8" fill="#32CD32"/>
  <ellipse cx="135" cy="95" rx="12" ry="8" fill="#32CD32"/>
</svg>
