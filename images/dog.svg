<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 狗身体 -->
  <ellipse cx="100" cy="95" rx="45" ry="30" fill="#D2691E"/>

  <!-- 狗头 -->
  <circle cx="100" cy="55" r="35" fill="#D2691E"/>

  <!-- 狗耳朵 -->
  <ellipse cx="70" cy="50" rx="12" ry="20" fill="#8B4513"/>
  <ellipse cx="130" cy="50" rx="12" ry="20" fill="#8B4513"/>

  <!-- 狗眼睛 -->
  <circle cx="90" cy="50" r="6" fill="white"/>
  <circle cx="110" cy="50" r="6" fill="white"/>
  <circle cx="91" cy="50" r="3" fill="black"/>
  <circle cx="111" cy="50" r="3" fill="black"/>

  <!-- 狗鼻子 -->
  <ellipse cx="100" cy="65" rx="10" ry="7" fill="black"/>

  <!-- 狗嘴巴 -->
  <path d="M 100 72 Q 90 80 85 75" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 72 Q 110 80 115 75" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 狗舌头 -->
  <ellipse cx="100" cy="78" rx="6" ry="8" fill="#FF69B4"/>

  <!-- 狗腿 -->
  <rect x="75" y="115" width="12" height="20" rx="6" fill="#D2691E"/>
  <rect x="113" y="115" width="12" height="20" rx="6" fill="#D2691E"/>

  <!-- 狗尾巴 -->
  <path d="M 145 85 Q 165 70 160 50" stroke="#D2691E" stroke-width="10" fill="none" stroke-linecap="round"/>
</svg>
