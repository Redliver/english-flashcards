<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#FFE4B5"/>
  <ellipse cx="100" cy="130" rx="90" ry="20" fill="#90EE90"/>

  <!-- 狗身体 -->
  <ellipse cx="100" cy="100" rx="45" ry="35" fill="#8B4513"/>

  <!-- 狗头 -->
  <circle cx="100" cy="55" r="38" fill="#8B4513"/>

  <!-- 狗耳朵 -->
  <ellipse cx="65" cy="40" rx="15" ry="25" fill="#654321"/>
  <ellipse cx="135" cy="40" rx="15" ry="25" fill="#654321"/>

  <!-- 狗眼睛 -->
  <circle cx="85" cy="50" r="8" fill="white"/>
  <circle cx="115" cy="50" r="8" fill="white"/>
  <circle cx="86" cy="50" r="4" fill="black"/>
  <circle cx="116" cy="50" r="4" fill="black"/>
  <circle cx="87" cy="49" r="1.5" fill="white"/>
  <circle cx="117" cy="49" r="1.5" fill="white"/>

  <!-- 狗鼻子 -->
  <ellipse cx="100" cy="68" rx="12" ry="10" fill="#333"/>

  <!-- 狗嘴巴 -->
