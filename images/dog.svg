  <!-- 狗腿 -->
  <rect x="70" y="120" width="12" height="25" rx="5" fill="#8B4513"/>
  <rect x="90" y="120" width="12" height="25" rx="5" fill="#8B4513"/>
  <rect x="108" y="120" width="12" height="25" rx="5" fill="#8B4513"/>
  <rect x="125" y="120" width="12" height="25" rx="5" fill="#8B4513"/>

  <!-- 狗尾巴 -->
  <path d="M145,100 Q175,90 170,60" stroke="#8B4513" stroke-width="10" fill="none" stroke-linecap="round"/>
</svg>