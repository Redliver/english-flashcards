<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#FFB6C1"/>
  <ellipse cx="100" cy="130" rx="90" ry="20" fill="#FF69B4"/>

  <!-- 猪身体 -->
  <ellipse cx="100" cy="95" rx="50" ry="40" fill="#FFB6C1"/>

  <!-- 猪头 -->
  <circle cx="100" cy="55" r="40" fill="#FFB6C1"/>

  <!-- 猪耳朵 -->
  <path d="M65,30 L55,5 L85,25 Z" fill="#FFB6C1"/>
  <path d="M135,30 L145,5 L115,25 Z" fill="#FFB6C1"/>

  <!-- 猪眼睛 -->
  <circle cx="80" cy="50" r="8" fill="white"/>
  <circle cx="120" cy="50" r="8" fill="white"/>
  <circle cx="82" cy="50" r="4" fill="black"/>
  <circle cx="122" cy="50" r="4" fill="black"/>
  <circle cx="83" cy="49" r="1.5" fill="white"/>
  <circle cx="123" cy="49" r="1.5" fill="white"/>

  <!-- 猪鼻子 -->
  <ellipse cx="100" cy="70" rx="25" ry="18" fill="#FF69B4"/>

  <!-- 猪鼻孔 -->
  <circle cx="90" cy="70" r="6" fill="#333"/>
  <circle cx="110" cy="70" r="6" fill="#333"/>

  <!-- 猪腿 -->
  <ellipse cx="65" y1="125" rx="12" ry="8" fill="#FFB6C1"/>
  <ellipse cx="135" y1="125" rx="12" ry="8" fill="#FFB6C1"/>
  <ellipse cx="85" y1="125" rx="12" ry="8" fill="#FFB6C1"/>
  <ellipse cx="115" y1="125" rx="12" ry="8" fill="#FFB6C1"/>

  <!-- 猪蹄子 -->
  <ellipse cx="65" cy="135" rx="10" ry="6" fill="#FF69B4"/>
  <ellipse cx="135" cy="135" rx="10" ry="6" fill="#FF69B4"/>
  <ellipse cx="85" cy="135" rx="10" ry="6" fill="#FF69B4"/>
  <ellipse cx="115" cy="135" rx="10" ry="6" fill="#FF69B4"/>

  <!-- 猪尾巴 -->
  <path d="M150,95 Q175,85 170,65" stroke="#FFB6C1" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M170,65 Q175,55 170,55" stroke="#FFB6C1" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>