<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 猫身体 -->
  <ellipse cx="100" cy="95" rx="40" ry="30" fill="#FFA500"/>

  <!-- 猫头 -->
  <circle cx="100" cy="55" r="30" fill="#FFA500"/>

  <!-- 猫耳朵 -->
  <path d="M 75 40 L 70 15 L 90 35 Z" fill="#FFA500"/>
  <path d="M 125 40 L 130 15 L 110 35 Z" fill="#FFA500"/>
  <path d="M 75 38 L 72 20 L 85 35 Z" fill="#FFB6C1"/>
  <path d="M 125 38 L 128 20 L 115 35 Z" fill="#FFB6C1"/>

  <!-- 猫眼睛 -->
  <ellipse cx="90" cy="55" rx="6" ry="8" fill="#228B22"/>
  <ellipse cx="110" cy="55" rx="6" ry="8" fill="#228B22"/>
  <circle cx="91" cy="53" r="2" fill="white"/>
  <circle cx="111" cy="53" r="2" fill="white"/>

  <!-- 猫鼻子 -->
  <polygon points="100,62 96,68 104,68" fill="#FF69B4"/>

  <!-- 猫嘴巴 -->
  <path d="M 100 68 Q 95 75 90 72" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 68 Q 105 75 110 72" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 猫胡须 -->
  <line x1="70" y1="60" x2="50" y2="55" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="70" y1="65" x2="50" y2="65" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="130" y1="60" x2="150" y2="55" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="130" y1="65" x2="150" y2="65" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- 猫尾巴 -->
  <path d="M 60 95 Q 40 80 45 60" stroke="#FFA500" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
