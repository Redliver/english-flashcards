<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 风筝线 -->
  <line x1="100" y1="50" x2="60" y2="140" stroke="#333" stroke-width="1" stroke-linecap="round"/>

  <!-- 风筝主体 -->
  <polygon points="100,20 140,50 100,80 60,50" fill="#FF6347"/>

  <!-- 风筝装饰 -->
  <polygon points="100,20 120,50 100,50" fill="#FFD700"/>
  <polygon points="100,80 80,50 100,50" fill="#FFD700"/>

  <!-- 风筝尾巴 -->
  <path d="M 100 80 Q 90 95 100 110" stroke="#FF6347" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100 110 Q 110 125 100 140" stroke="#FFD700" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 尾巴蝴蝶结 -->
  <ellipse cx="95" cy="95" rx="8" ry="5" fill="#FF6347"/>
  <ellipse cx="105" cy="95" rx="8" ry="5" fill="#FF6347"/>
  <ellipse cx="95" cy="125" rx="8" ry="5" fill="#FFD700"/>
  <ellipse cx="105" cy="125" rx="8" ry="5" fill="#FFD700"/>
</svg>
