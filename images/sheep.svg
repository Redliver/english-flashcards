  <!-- 绵羊耳朵 -->
  <ellipse cx="78" cy="55" rx="10" ry="6" fill="#333"/>
  <ellipse cx="122" cy="55" rx="10" ry="6" fill="#333"/>

  <!-- 绵羊眼睛 -->
  <circle cx="93" cy="50" r="5" fill="white"/>
  <circle cx="107" cy="50" r="5" fill="white"/>
  <circle cx="93" cy="50" r="2.5" fill="black"/>
  <circle cx="107" cy="50" r="2.5" fill="black"/>

  <!-- 绵羊腿 -->
