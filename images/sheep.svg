  <!-- 绵羊身体（羊毛） -->
  <circle cx="85" cy="85" r="18" fill="white"/>
  <circle cx="100" cy="75" r="18" fill="white"/>
  <circle cx="115" cy="85" r="18" fill="white"/>
  <circle cx="100" cy="95" r="18" fill="white"/>
  <circle cx="85" cy="100" r="16" fill="white"/>
  <circle cx="115" cy="100" r="16" fill="white"/>
  <circle cx="70" cy="90" r="15" fill="white"/>
  <circle cx="130" cy="90" r="15" fill="white"/>

  <!-- 绵羊头 -->
