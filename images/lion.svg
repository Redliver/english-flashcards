<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 狮子身体 -->
  <ellipse cx="100" cy="95" rx="40" ry="30" fill="#DAA520"/>

  <!-- 狮子头（带鬃毛） -->
  <circle cx="100" cy="55" r="35" fill="#8B4513"/>
  <circle cx="100" cy="55" r="25" fill="#DAA520"/>

  <!-- 狮子耳朵 -->
  <circle cx="78" cy="35" r="8" fill="#DAA520"/>
  <circle cx="122" cy="35" r="8" fill="#DAA520"/>
  <circle cx="78" cy="35" r="4" fill="#8B4513"/>
  <circle cx="122" cy="35" r="4" fill="#8B4513"/>

  <!-- 狮子眼睛 -->
  <circle cx="90" cy="50" r="5" fill="black"/>
  <circle cx="110" cy="50" r="5" fill="black"/>
  <circle cx="91" cy="49" r="2" fill="white"/>
  <circle cx="111" cy="49" r="2" fill="white"/>

  <!-- 狮子鼻子 -->
  <ellipse cx="100" cy="62" rx="8" ry="6" fill="#8B4513"/>

  <!-- 狮子嘴巴 -->
  <path d="M 90 68 Q 100 75 110 68" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 狮子尾巴 -->
  <path d="M 140 95 Q 160 90 160 70" stroke="#DAA520" stroke-width="8" fill="none" stroke-linecap="round"/>
  <ellipse cx="160" cy="65" rx="6" ry="8" fill="#8B4513"/>
</svg>
