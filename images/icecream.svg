<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#E6E6FA"/>
 <ellipse cx="100" cy="135" rx="80" ry="15" fill="#FFB6C1"/>

 <!-- 冰淇淋蛋筒 -->
 <path d="M70,100 L100,145 L130,100 Z" fill="#D2691E"/>
 <path d="M75,105 L100,140 L125,105 Z" fill="#DEB887"/>

 <!-- 蛋筒纹理 -->
 <path d="M80,110 L100,135 L120,110" stroke="#8B4513" stroke-width="1" fill="none"/>
 <path d="M85,120 L100,135 L115,120" stroke="#8B4513" stroke-width="1" fill="none"/>

 <!-- 冰淇淋球 -->
 <circle cx="100" cy="60" r="45" fill="#FFB6C1"/>
 <circle cx="85" cy="50" r="15" fill="#FFC0CB" opacity="0.6"/>
 <circle cx="110" cy="55" r="12" fill="#FFD1DC" opacity="0.5"/>

 <!-- 樱桃 -->
 <circle cx="100" cy="25" r="12" fill="#DC143C"/>
 <ellipse cx="96" cy="22" rx="4" ry="3" fill="#FF6B6B" opacity="0.5"/>
 <path d="M100,13 Q105,5 115,0" stroke="#228B22" stroke-width="3" fill="none"/>

 <!-- 糖屑 -->
 <rect x="75" y="70" width="6" height="3" rx="1" fill="#FF69B4" transform="rotate(30, 78, 71)"/>
 <rect x="115" y="75" width="6" height="3" rx="1" fill="#87CEEB" transform="rotate(-20, 118, 76)"/>
 <rect x="90" y="85" width="6" height="3" rx="1" fill="#98FB98" transform="rotate(45, 93, 86)"/>
 <rect x="105" y="65" width="6" height="3" rx="1" fill="#FFD700" transform="rotate(-30, 108, 66)"/>
 <rect x="80" y="60" width="6" height="3" rx="1" fill="#FFA500" transform="rotate(15, 83, 61)"/>
</svg>