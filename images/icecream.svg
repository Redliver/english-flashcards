<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 冰淇淋蛋筒 -->
  <polygon points="100,120 70,60 130,60" fill="#F4A460"/>

  <!-- 蛋筒纹理 -->
  <line x1="85" y1="90" x2="95" y2="95" stroke="#D2691E" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="75" x2="100" y2="80" stroke="#D2691E" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="85" x2="115" y2="90" stroke="#D2691E" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="110" y2="105" stroke="#D2691E" stroke-width="2" stroke-linecap="round"/>

  <!-- 冰淇淋球 -->
  <circle cx="100" cy="50" r="25" fill="#FFB6C1"/>
  <circle cx="85" cy="55" r="18" fill="#FFF0F5"/>
  <circle cx="115" cy="55" r="18" fill="#98FB98"/>

  <!-- 冰淇淋高光 -->
  <ellipse cx="95" cy="45" rx="5" ry="8" fill="white" opacity="0.5"/>
  <ellipse cx="80" cy="50" rx="4" ry="6" fill="white" opacity="0.5"/>
  <ellipse cx="110" cy="50" rx="4" ry="6" fill="white" opacity="0.5"/>

  <!-- 樱桃 -->
  <circle cx="100" cy="28" r="8" fill="#DC143C"/>
  <path d="M 100 20 Q 105 10 110 8" stroke="#228B22" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
