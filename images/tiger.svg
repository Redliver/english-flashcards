<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 老虎身体 -->
  <ellipse cx="100" cy="90" rx="50" ry="30" fill="#FF8C00"/>

  <!-- 老虎条纹 - 身体 -->
  <path d="M 70 70 Q 80 90 70 110" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 90 65 Q 100 90 90 115" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 110 65 Q 120 90 110 115" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 130 70 Q 140 90 130 110" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 老虎头 -->
  <circle cx="100" cy="50" r="30" fill="#FF8C00"/>

  <!-- 老虎耳朵 -->
  <circle cx="78" cy="30" r="10" fill="#FF8C00"/>
  <circle cx="122" cy="30" r="10" fill="#FF8C00"/>
  <circle cx="78" cy="30" r="5" fill="#FFB6C1"/>
  <circle cx="122" cy="30" r="5" fill="#FFB6C1"/>

  <!-- 老虎脸部条纹 -->
  <path d="M 85 35 L 90 50" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <path d="M 115 35 L 110 50" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <path d="M 100 30 L 100 45" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

  <!-- 老虎眼睛 -->
  <circle cx="90" cy="48" r="5" fill="white"/>
  <circle cx="110" cy="48" r="5" fill="white"/>
  <circle cx="91" cy="48" r="3" fill="black"/>
  <circle cx="111" cy="48" r="3" fill="black"/>

  <!-- 老虎鼻子 -->
  <polygon points="100,58 95,65 105,65" fill="#FF69B4"/>

  <!-- 老虎嘴巴 -->
  <path d="M 95 68 Q 100 75 105 68" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 老虎胡须 -->
  <line x1="75" y1="55" x2="60" y2="52" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="75" y1="60" x2="60" y2="62" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="125" y1="55" x2="140" y2="52" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <line x1="125" y1="60" x2="140" y2="62" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- 老虎腿 -->
  <rect x="70" y="115" width="12" height="20" rx="3" fill="#FF8C00"/>
  <rect x="118" y="115" width="12" height="20" rx="3" fill="#FF8C00"/>

  <!-- 老虎尾巴 -->
  <path d="M 150 85 Q 170 80 170 60" stroke="#FF8C00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 160 75 L 165 65" stroke="black" stroke-width="4" stroke-linecap="round"/>
</svg>
