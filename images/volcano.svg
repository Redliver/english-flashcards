<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 火山主体 -->
  <polygon points="50,130 100,40 150,130" fill="#8B4513"/>
  <polygon points="60,130 100,50 140,130" fill="#A0522D"/>

  <!-- 火山口 -->
  <ellipse cx="100" cy="50" rx="15" ry="5" fill="#333"/>
  <ellipse cx="100" cy="52" rx="10" ry="3" fill="#4a0000"/>

  <!-- 岩浆 -->
  <ellipse cx="100" cy="50" rx="8" ry="4" fill="#FF4500"/>
  <path d="M 95 52 Q 90 65 95 80" stroke="#FF4500" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 105 52 Q 110 65 105 80" stroke="#FF4500" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 岩浆滴落 -->
  <circle cx="95" cy="85" r="4" fill="#FF4500"/>
  <circle cx="105" cy="75" r="3" fill="#FF6347"/>

  <!-- 烟雾 -->
  <circle cx="90" cy="30" r="10" fill="#696969" opacity="0.6"/>
  <circle cx="100" cy="20" r="12" fill="#808080" opacity="0.5"/>
  <circle cx="110" cy="30" r="9" fill="#696969" opacity="0.6"/>

  <!-- 火山底部石头 -->
  <circle cx="60" cy="130" r="5" fill="#696969"/>
  <circle cx="140" cy="130" r="6" fill="#696969"/>
</svg>
