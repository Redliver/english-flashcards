<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#87CEEB"/>
 <ellipse cx="100" cy="145" rx="90" ry="8" fill="#228B22"/>

 <!-- 树枝巢底 -->
 <ellipse cx="100" cy="115" rx="55" ry="20" fill="#8B4513"/>
 <ellipse cx="100" cy="110" rx="50" ry="18" fill="#A0522D"/>

 <!-- 树枝编织 -->
 <path d="M50,110 Q100,125 150,110" stroke="#654321" stroke-width="6" fill="none"/>
 <path d="M55,100 Q100,115 145,100" stroke="#8B4513" stroke-width="5" fill="none"/>
 <path d="M60,90 Q100,105 140,90" stroke="#654321" stroke-width="5" fill="none"/>

 <!-- 蛋 -->
 <ellipse cx="85" cy="95" rx="20" ry="15" fill="#FFF8DC"/>
 <ellipse cx="115" cy="92" rx="18" ry="14" fill="#FFF8DC"/>
 <ellipse cx="100" cy="88" rx="16" ry="13" fill="#FFF8DC"/>

 <!-- 蛋斑点 -->
 <circle cx="80" cy="92" r="3" fill="#DEB887"/>
 <circle cx="90" cy="98" r="2" fill="#DEB887"/>
 <circle cx="110" cy="88" r="2" fill="#DEB887"/>
 <circle cx="120" cy="95" r="3" fill="#DEB887"/>
 <circle cx="98" cy="85" r="2" fill="#DEB887"/>

 <!-- 蛋高光 -->
 <ellipse cx="82" cy="90" rx="5" ry="3" fill="white" opacity="0.4"/>
 <ellipse cx="112" cy="87" rx="4" ry="2" fill="white" opacity="0.4"/>

 <!-- 伸出巢外的蛋 -->
 <ellipse cx="140" cy="100" rx="12" ry="10" fill="#FFF8DC"/>
 <circle cx="137" cy="97" r="2" fill="#DEB887"/>
</svg>