<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 树枝 -->
  <path d="M 20 100 Q 60 90 100 95 Q 140 100 180 85" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- 鸟巢外圈 - 编织纹理 -->
  <ellipse cx="100" cy="105" rx="45" ry="18" fill="#8B4513"/>
  <ellipse cx="100" cy="102" rx="42" ry="15" fill="#A0522D"/>

  <!-- 编织纹理线条 -->
  <path d="M 60 100 Q 100 115 140 100" stroke="#654321" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 65 95 Q 100 108 135 95" stroke="#654321" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 70 90 Q 100 100 130 90" stroke="#654321" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 鸟巢内窝 -->
  <ellipse cx="100" cy="98" rx="30" ry="10" fill="#5D4037"/>

  <!-- 鸟蛋 - 更明显更大 -->
  <ellipse cx="90" cy="95" rx="10" ry="13" fill="#87CEEB"/>
  <ellipse cx="110" cy="95" rx="10" ry="13" fill="#FFD700"/>
  <ellipse cx="100" cy="90" rx="9" ry="12" fill="#FF6B6B"/>

  <!-- 蛋上的斑点 -->
  <circle cx="88" cy="93" r="2" fill="#4682B4" opacity="0.6"/>
  <circle cx="92" cy="97" r="1.5" fill="#4682B4" opacity="0.6"/>
  <circle cx="108" cy="92" r="2" fill="#DAA520" opacity="0.6"/>
  <circle cx="112" cy="96" r="1.5" fill="#DAA520" opacity="0.6"/>
  <circle cx="98" cy="88" r="1.5" fill="#DC143C" opacity="0.6"/>

  <!-- 蛋高光 -->
  <ellipse cx="87" cy="91" rx="3" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="107" cy="90" rx="3" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="97" cy="86" rx="2.5" ry="3.5" fill="white" opacity="0.5"/>

  <!-- 小树枝装饰 -->
  <line x1="75" y1="108" x2="70" y2="115" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  <line x1="125" y1="108" x2="130" y2="115" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
</svg>
