<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 奶牛身体 -->
  <ellipse cx="100" cy="90" rx="50" ry="35" fill="white"/>

  <!-- 奶牛斑点 -->
  <ellipse cx="80" cy="80" rx="15" ry="12" fill="black"/>
  <ellipse cx="120" cy="95" rx="12" ry="10" fill="black"/>
  <ellipse cx="100" cy="105" rx="10" ry="8" fill="black"/>

  <!-- 奶牛头 -->
  <ellipse cx="100" cy="50" rx="30" ry="25" fill="white"/>

  <!-- 奶牛头部斑点 -->
  <ellipse cx="85" cy="40" rx="8" ry="6" fill="black"/>
  <ellipse cx="115" cy="55" rx="6" ry="5" fill="black"/>

  <!-- 奶牛耳朵 -->
  <ellipse cx="70" cy="45" rx="10" ry="6" fill="#FFB6C1"/>
  <ellipse cx="130" cy="45" rx="10" ry="6" fill="#FFB6C1"/>

  <!-- 奶牛角 -->
  <path d="M 80 30 L 75 15" stroke="#F5DEB3" stroke-width="5" stroke-linecap="round"/>
  <path d="M 120 30 L 125 15" stroke="#F5DEB3" stroke-width="5" stroke-linecap="round"/>

  <!-- 奶牛眼睛 -->
  <circle cx="90" cy="45" r="5" fill="black"/>
  <circle cx="110" cy="45" r="5" fill="black"/>
  <circle cx="91" cy="44" r="2" fill="white"/>
  <circle cx="111" cy="44" r="2" fill="white"/>

  <!-- 奶牛鼻子 -->
  <ellipse cx="100" cy="62" rx="15" ry="10" fill="#FFB6C1"/>
  <circle cx="95" cy="62" r="3" fill="#FF69B4"/>
  <circle cx="105" cy="62" r="3" fill="#FF69B4"/>

  <!-- 奶牛腿 -->
  <rect x="75" y="115" width="10" height="20" rx="3" fill="white"/>
  <rect x="115" y="115" width="10" height="20" rx="3" fill="white"/>
  <rect x="78" y="118" width="6" height="10" rx="2" fill="black"/>
  <rect x="118" y="118" width="6" height="10" rx="2" fill="black"/>

  <!-- 奶牛尾巴 -->
  <path d="M 150 85 Q 165 80 165 95" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="165" cy="98" rx="4" ry="6" fill="black"/>
</svg>
