<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#98FB98"/>
 <ellipse cx="100" cy="135" rx="80" ry="15" fill="#228B22"/>

 <!-- 苹果主体 -->
 <circle cx="100" cy="85" r="45" fill="#DC143C"/>
 <circle cx="80" cy="70" r="15" fill="#FF6B6B" opacity="0.5"/>
 <circle cx="115" cy="95" r="10" fill="#B22222" opacity="0.3"/>

 <!-- 苹果柄 -->
 <path d="M100,40 Q105,30 115,25" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>

 <!-- 苹果叶 -->
 <ellipse cx="95" cy="42" rx="18" ry="10" fill="#32CD32" transform="rotate(-30, 95, 42)"/>
 <path d="M95,42 L115,40" stroke="#228B22" stroke-width="2"/>

 <!-- 苹果萼片 -->
 <path d="M85,45 Q95,55 105,45" stroke="#006400" stroke-width="3" fill="none"/>
</svg>