<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 鸭子身体 -->
  <ellipse cx="100" cy="85" rx="45" ry="35" fill="#FFD700"/>

  <!-- 鸭子头 -->
  <circle cx="145" cy="55" r="28" fill="#FFD700"/>

  <!-- 鸭子嘴巴 -->
  <ellipse cx="168" cy="55" rx="18" ry="10" fill="#FF8C00"/>

  <!-- 鸭子眼睛 -->
  <circle cx="152" cy="48" r="5" fill="white"/>
  <circle cx="154" cy="48" r="2.5" fill="black"/>

  <!-- 鸭子翅膀 -->
  <ellipse cx="85" cy="85" rx="20" ry="15" fill="#FFA500"/>

  <!-- 鸭子脚 -->
  <line x1="90" y1="115" x2="85" y2="135" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="115" x2="115" y2="135" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="135" x2="90" y2="135" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="135" x2="120" y2="135" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
</svg>
