<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 蜜蜂身体 -->
  <ellipse cx="100" cy="80" rx="35" ry="25" fill="#FFD700"/>

  <!-- 蜜蜂条纹 -->
  <rect x="85" y="60" width="8" height="40" rx="2" fill="black"/>
  <rect x="96" y="58" width="8" height="44" rx="2" fill="black"/>
  <rect x="107" y="60" width="8" height="40" rx="2" fill="black"/>

  <!-- 蜜蜂头 -->
  <circle cx="100" cy="45" r="18" fill="#FFD700"/>

  <!-- 蜜蜂眼睛 -->
  <circle cx="95" cy="42" r="4" fill="black"/>
  <circle cx="105" cy="42" r="4" fill="black"/>
  <circle cx="96" cy="41" r="1.5" fill="white"/>
  <circle cx="106" cy="41" r="1.5" fill="white"/>

  <!-- 蜜蜂触角 -->
  <line x1="92" y1="30" x2="80" y2="15" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="30" x2="120" y2="15" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <circle cx="80" cy="15" r="3" fill="black"/>
  <circle cx="120" cy="15" r="3" fill="black"/>

  <!-- 蜜蜂翅膀 -->
  <ellipse cx="75" cy="65" rx="20" ry="12" fill="#E0FFFF" opacity="0.8"/>
  <ellipse cx="125" cy="65" rx="20" ry="12" fill="#E0FFFF" opacity="0.8"/>
  <ellipse cx="78" cy="60" rx="15" ry="10" fill="#E0FFFF" opacity="0.6"/>
  <ellipse cx="122" cy="60" rx="15" ry="10" fill="#E0FFFF" opacity="0.6"/>

  <!-- 蜜蜂刺 -->
  <polygon points="100,105 95,120 105,120" fill="black"/>
</svg>
