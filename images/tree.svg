<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 树干 -->
  <rect x="90" y="90" width="20" height="45" fill="#8B4513"/>

  <!-- 树冠 -->
  <circle cx="100" cy="60" r="35" fill="#228B22"/>
  <circle cx="75" cy="75" r="25" fill="#228B22"/>
  <circle cx="125" cy="75" r="25" fill="#228B22"/>
  <circle cx="85" cy="50" r="20" fill="#32CD32"/>
  <circle cx="115" cy="50" r="20" fill="#32CD32"/>

  <!-- 树冠高光 -->
  <ellipse cx="90" cy="55" rx="8" ry="12" fill="#90EE90" opacity="0.4"/>
  <ellipse cx="110" cy="45" rx="6" ry="10" fill="#90EE90" opacity="0.4"/>

  <!-- 树根 -->
  <path d="M 90 130 Q 80 135 75 140" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 110 130 Q 120 135 125 140" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
