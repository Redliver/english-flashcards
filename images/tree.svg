<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#87CEEB"/>
 <ellipse cx="100" cy="140" rx="90" ry="10" fill="#228B22"/>

 <!-- 树干 -->
 <rect x="85" y="80" width="30" height="60" fill="#8B4513"/>
 <rect x="80" y="85" width="5" height="50" fill="#A0522D" opacity="0.5"/>
 <rect x="115" y="85" width="5" height="50" fill="#A0522D" opacity="0.5"/>

 <!-- 树根 -->
 <path d="M85,140 Q70,135 65,145" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>
 <path d="M115,140 Q130,135 135,145" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>

 <!-- 树冠 - 多层圆形 -->
 <circle cx="100" cy="50" r="45" fill="#228B22"/>
 <circle cx="70" cy="65" r="30" fill="#2E8B57"/>
 <circle cx="130" cy="65" r="30" fill="#2E8B57"/>
 <circle cx="100" cy="35" r="35" fill="#32CD32"/>
 <circle cx="80" cy="55" r="25" fill="#3CB371"/>
 <circle cx="120" cy="55" r="25" fill="#3CB371"/>
 <circle cx="100" cy="20" r="25" fill="#90EE90"/>

 <!-- 树叶高光 -->
 <ellipse cx="85" cy="35" rx="15" ry="10" fill="#98FB98" opacity="0.4"/>
 <ellipse cx="115" cy="45" rx="12" ry="8" fill="#98FB98" opacity="0.3"/>

 <!-- 苹果（在树上） -->
 <circle cx="75" cy="50" r="8" fill="#DC143C"/>
 <circle cx="70" cy="47" r="3" fill="#FF6B6B" opacity="0.5"/>
 <circle cx="125" cy="40" r="8" fill="#DC143C"/>
 <circle cx="120" cy="37" r="3" fill="#FF6B6B" opacity="0.5"/>
 <circle cx="95" cy="25" r="7" fill="#DC143C"/>
 <circle cx="92" cy="22" r="2" fill="#FF6B6B" opacity="0.5"/>
</svg>