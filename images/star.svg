<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 - 夜空 -->
  <rect width="200" height="150" fill="#191970"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#2F4F4F"/>

  <!-- 小星星背景 -->
  <circle cx="30" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="170" cy="40" r="2" fill="white" opacity="0.7"/>
  <circle cx="150" cy="60" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="40" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="180" cy="90" r="2" fill="white" opacity="0.7"/>

  <!-- 主星星 - 五角星 -->
  <polygon points="100,25 107,45 128,45 112,58 118,78 100,65 82,78 88,58 72,45 93,45" fill="#FFD700"/>

  <!-- 星星高光 -->
  <polygon points="100,30 105,45 120,45 108,55 112,70 100,60 88,70 92,55 80,45 95,45" fill="#FFEC8B"/>

  <!-- 星星光芒 -->
  <line x1="100" y1="15" x2="100" y2="5" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="100" y2="105" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="55" x2="50" y2="55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="55" x2="150" y2="55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="35" x2="65" y2="25" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="35" x2="135" y2="25" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="75" x2="65" y2="85" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="75" x2="135" y2="85" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>

  <!-- 星星笑脸 -->
  <circle cx="95" cy="55" r="2" fill="black"/>
  <circle cx="105" cy="55" r="2" fill="black"/>
  <path d="M 95 62 Q 100 66 105 62" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="90" cy="60" rx="3" ry="2" fill="#FF8C00" opacity="0.5"/>
  <ellipse cx="110" cy="60" rx="3" ry="2" fill="#FF8C00" opacity="0.5"/>
</svg>
