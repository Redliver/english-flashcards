<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#98FB98"/>

 <!-- 阴影 -->
 <ellipse cx="100" cy="130" rx="40" ry="10" fill="rgba(0,0,0,0.2)"/>

 <!-- 足球主体 -->
 <circle cx="100" cy="75" r="45" fill="white" stroke="#333" stroke-width="2"/>

 <!-- 足球花纹 - 五边形 -->
 <polygon points="100,35 120,55 110,80 90,80 80,55" fill="#333"/>
 <polygon points="100,115 115,95 105,75 95,75 85,95" fill="#333"/>

 <!-- 足球花纹 - 周围 -->
 <polygon points="70,55 80,55 85,70 75,80 65,70" fill="#333"/>
 <polygon points="130,55 120,55 115,70 125,80 135,70" fill="#333"/>
 <polygon points="75,95 85,95 90,110 80,120 70,110" fill="#333"/>
 <polygon points="125,95 115,95 110,110 120,120 130,110" fill="#333"/>

 <!-- 高光 -->
 <ellipse cx="80" cy="55" rx="15" ry="10" fill="white" opacity="0.6" transform="rotate(-30, 80, 55)"/>
 <ellipse cx="85" cy="50" rx="8" ry="5" fill="white" opacity="0.8"/>

 <!-- 线条 -->
 <path d="M100,30 L100,120" stroke="#333" stroke-width="1" opacity="0.5"/>
 <path d="M55,75 L145,75" stroke="#333" stroke-width="1" opacity="0.5"/>
</svg>