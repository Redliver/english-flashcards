<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 沙滩球主体 -->
  <circle cx="100" cy="80" r="50" fill="#FF0000"/>

  <!-- 沙滩球白色条纹 -->
  <path d="M 100 30 Q 130 80 100 130" fill="white"/>
  <path d="M 100 30 Q 70 80 100 130" fill="white"/>

  <!-- 沙滩球彩色分区 -->
  <path d="M 100 30 A 50 50 0 0 1 150 80 L 100 80 Z" fill="#FFD700"/>
  <path d="M 100 130 A 50 50 0 0 1 50 80 L 100 80 Z" fill="#0000FF"/>

  <!-- 中心圆 -->
  <circle cx="100" cy="80" r="12" fill="white"/>

  <!-- 高光 -->
  <ellipse cx="80" cy="60" rx="10" ry="15" fill="white" opacity="0.4"/>
</svg>
