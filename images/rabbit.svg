<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 兔子身体 -->
  <ellipse cx="100" cy="95" rx="35" ry="25" fill="white"/>

  <!-- 兔子头 -->
  <circle cx="100" cy="60" r="25" fill="white"/>

  <!-- 兔子长耳朵 - 标志性特征 -->
  <ellipse cx="90" cy="30" rx="8" ry="25" fill="white"/>
  <ellipse cx="110" cy="30" rx="8" ry="25" fill="white"/>
  <ellipse cx="90" cy="30" rx="4" ry="18" fill="#FFB6C1"/>
  <ellipse cx="110" cy="30" rx="4" ry="18" fill="#FFB6C1"/>

  <!-- 兔子眼睛 -->
  <circle cx="92" cy="58" r="4" fill="black"/>
  <circle cx="108" cy="58" r="4" fill="black"/>
  <circle cx="93" cy="57" r="1.5" fill="white"/>
  <circle cx="109" cy="57" r="1.5" fill="white"/>

  <!-- 兔子鼻子 -->
  <polygon points="100,65 97,70 103,70" fill="#FF69B4"/>

  <!-- 兔子嘴巴 -->
  <path d="M 100 70 Q 95 75 90 72" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 70 Q 105 75 110 72" stroke="black" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 兔子门牙 -->
  <rect x="97" y="72" width="3" height="4" fill="white" stroke="#DDD" stroke-width="0.5"/>
  <rect x="100" y="72" width="3" height="4" fill="white" stroke="#DDD" stroke-width="0.5"/>

  <!-- 兔子腮红 -->
  <ellipse cx="82" cy="65" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="118" cy="65" rx="4" ry="3" fill="#FFB6C1" opacity="0.6"/>

  <!-- 兔子前爪 -->
  <ellipse cx="85" cy="100" rx="6" ry="8" fill="white"/>
  <ellipse cx="115" cy="100" rx="6" ry="8" fill="white"/>

  <!-- 兔子后腿 -->
  <ellipse cx="75" cy="115" rx="10" ry="8" fill="white"/>
  <ellipse cx="125" cy="115" rx="10" ry="8" fill="white"/>

  <!-- 兔子尾巴 -->
  <circle cx="135" cy="95" r="8" fill="white"/>
</svg>
