<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 气泡 -->
  <circle cx="50" cy="50" r="5" fill="white" opacity="0.6"/>
  <circle cx="60" cy="35" r="3" fill="white" opacity="0.5"/>
  <circle cx="150" cy="45" r="4" fill="white" opacity="0.6"/>
  <circle cx="165" cy="60" r="6" fill="white" opacity="0.5"/>

  <!-- 鱼身体 -->
  <ellipse cx="100" cy="80" rx="50" ry="30" fill="#FF8C00"/>

  <!-- 鱼尾巴 -->
  <polygon points="50,80 25,60 25,100" fill="#FF8C00"/>

  <!-- 鱼鳍 -->
  <path d="M 100 50 L 85 35 L 115 35 Z" fill="#FF6347"/>
  <path d="M 90 80 L 75 95 L 105 95 Z" fill="#FF6347"/>

  <!-- 鱼眼睛 -->
  <circle cx="135" cy="70" r="8" fill="white"/>
  <circle cx="137" cy="70" r="4" fill="black"/>
  <circle cx="138" cy="68" r="2" fill="white"/>

  <!-- 鱼鳞 -->
  <path d="M 80 70 Q 85 75 90 70" stroke="#FF6347" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 95 70 Q 100 75 105 70" stroke="#FF6347" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 110 70 Q 115 75 120 70" stroke="#FF6347" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 87 82 Q 92 87 97 82" stroke="#FF6347" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 102 82 Q 107 87 112 82" stroke="#FF6347" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
