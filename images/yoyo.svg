<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#E6E6FA"/>

 <!-- 悠悠线 -->
 <path d="M100,50 Q80,80 100,110 Q120,140 100,150" stroke="#FF69B4" stroke-width="3" fill="none"/>
 <path d="M100,50 Q120,80 100,110 Q80,140 100,150" stroke="#FF69B4" stroke-width="3" fill="none"/>

 <!-- 悠悠主体 - 上层 -->
 <ellipse cx="100" cy="50" rx="35" ry="12" fill="#4169E1"/>
 <ellipse cx="100" cy="48" rx="30" ry="10" fill="#5B8DEE"/>

 <!-- 悠悠中间层 -->
 <ellipse cx="100" cy="50" rx="20" ry="8" fill="white"/>
 <ellipse cx="100" cy="50" rx="12" ry="5" fill="#4169E1"/>

 <!-- 悠悠高光 -->
 <ellipse cx="88" cy="45" rx="8" ry="4" fill="white" opacity="0.4"/>
 <ellipse cx="90" cy="43" rx="5" ry="2" fill="white" opacity="0.6"/>

 <!-- 悠悠下层 - 运动模糊效果 -->
 <ellipse cx="100" cy="90" rx="25" ry="8" fill="#4169E1" opacity="0.5"/>
 <ellipse cx="100" cy="110" rx="20" ry="6" fill="#4169E1" opacity="0.3"/>

 <!-- 动作箭头 -->
 <path d="M140,70 L140,100" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
 <path d="M140,70 Q150,85 140,100" stroke="#333" stroke-width="3" fill="none"/>

 <!-- 上下箭头 -->
 <text x="155" y="75" font-size="20" fill="#333">↑</text>
 <text x="155" y="105" font-size="20" fill="#333">↓</text>

 <!-- 定义箭头标记 -->
 <defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
   <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
  </marker>
 </defs>
</svg>