<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 悠悠球绳子 -->
  <line x1="100" y1="30" x2="100" y2="60" stroke="#F5DEB3" stroke-width="2" stroke-linecap="round"/>

  <!-- 悠悠球上半部分 -->
  <ellipse cx="100" cy="70" rx="30" ry="12" fill="#FF0000"/>
  <ellipse cx="100" cy="68" rx="25" ry="8" fill="#FF6B6B"/>

  <!-- 悠悠球中间轴 -->
  <rect x="95" y="70" width="10" height="8" fill="#C0C0C0"/>

  <!-- 悠悠球下半部分 -->
  <ellipse cx="100" cy="82" rx="30" ry="12" fill="#0000FF"/>
  <ellipse cx="100" cy="84" rx="25" ry="8" fill="#4169E1"/>

  <!-- 悠悠球装饰 -->
  <circle cx="85" cy="70" r="4" fill="#FFD700"/>
  <circle cx="115" cy="70" r="4" fill="#FFD700"/>
  <circle cx="85" cy="82" r="4" fill="#FFD700"/>
  <circle cx="115" cy="82" r="4" fill="#FFD700"/>
</svg>
