<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 大象身体 -->
  <ellipse cx="100" cy="90" rx="50" ry="35" fill="#A9A9A9"/>

  <!-- 大象头 -->
  <circle cx="100" cy="55" r="30" fill="#A9A9A9"/>

  <!-- 大象耳朵 -->
  <ellipse cx="65" cy="55" rx="20" ry="25" fill="#808080"/>
  <ellipse cx="135" cy="55" rx="20" ry="25" fill="#808080"/>
  <ellipse cx="68" cy="55" rx="12" ry="18" fill="#D3D3D3"/>
  <ellipse cx="132" cy="55" rx="12" ry="18" fill="#D3D3D3"/>

  <!-- 大象眼睛 -->
  <circle cx="90" cy="50" r="5" fill="black"/>
  <circle cx="110" cy="50" r="5" fill="black"/>
  <circle cx="91" cy="49" r="2" fill="white"/>
  <circle cx="111" cy="49" r="2" fill="white"/>

  <!-- 大象鼻子 -->
  <path d="M 100 65 Q 100 100 100 115 Q 100 125 110 120" stroke="#A9A9A9" stroke-width="15" fill="none" stroke-linecap="round"/>

  <!-- 大象腿 -->
  <rect x="70" y="115" width="12" height="20" rx="3" fill="#A9A9A9"/>
  <rect x="118" y="115" width="12" height="20" rx="3" fill="#A9A9A9"/>

  <!-- 大象尾巴 -->
  <path d="M 150 85 Q 165 80 165 95" stroke="#A9A9A9" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="165" cy="98" rx="3" ry="5" fill="#808080"/>
