 <!-- 大象耳朵 -->
 <ellipse cx="55" cy="70" rx="35" ry="45" fill="#A9A9A9"/>
 <ellipse cx="145" cy="70" rx="35" ry="45" fill="#A9A9A9"/>
 <ellipse cx="55" cy="70" rx="20" ry="30" fill="#D3D3D3"/>
 <ellipse cx="145" cy="70" rx="20" ry="30" fill="#D3D3D3"/>

