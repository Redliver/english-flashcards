 <path d="M72,60 Q80,55 88,60" stroke="#666" stroke-width="2" fill="none"/>
 <path d="M112,60 Q120,55 128,60" stroke="#666" stroke-width="2" fill="none"/>

 <!-- 大象鼻子 -->
 <path d="M100,100 Q100,140 80,145 Q70,145 65,140" stroke="#A9A9A9" stroke-width="20" fill="none" stroke-linecap="round"/>
 <path d="M100,100 Q100,140 85,145 Q75,145 70,140" stroke="#909090" stroke-width="10" fill="none" stroke-linecap="round"/>

 <!-- 大象牙 -->
 <path d="M60,110 L55,140 L50,110" fill="#FFFFF0" stroke="#DDD" stroke-width="1"/>
 <path d="M140,110 L145,140 L150,110" fill="#FFFFF0" stroke="#DDD" stroke-width="1"/>

 <!-- 大象腿 -->
 <rect x="50" y="115" width="20" height="35" rx="8" fill="#A9A9A9"/>
 <rect x="85" y="115" width="20" height="35" rx="8" fill="#A9A9A9"/>
 <rect x="115" y="115" width="20" height="35" rx="8" fill="#A9A9A9"/>
