 <!-- 大象眼睛 -->
 <circle cx="80" cy="70" r="8" fill="white"/>
 <circle cx="82" cy="70" r="4" fill="#333"/>
 <circle cx="83" cy="68" r="1.5" fill="white"/>
 <circle cx="120" cy="70" r="8" fill="white"/>
 <circle cx="118" cy="70" r="4" fill="#333"/>
 <circle cx="119" cy="68" r="1.5" fill="white"/>

