<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 果冻模具/盘子 -->
  <ellipse cx="100" cy="115" rx="50" ry="12" fill="#DDD"/>
  <ellipse cx="100" cy="112" rx="47" ry="10" fill="#EEE"/>

  <!-- 果冻主体 - 半透明效果 -->
  <path d="M 60 70 Q 60 110 100 110 Q 140 110 140 70 Q 140 50 100 50 Q 60 50 60 70" fill="#FF69B4" opacity="0.85"/>

  <!-- 果冻内部层次 - 表现透明感 -->
  <ellipse cx="100" cy="65" rx="35" ry="15" fill="#FF8CC3" opacity="0.7"/>
  <ellipse cx="100" cy="55" rx="25" ry="10" fill="#FFA8D3" opacity="0.6"/>

  <!-- 果冻高光 - 表现光泽 -->
  <ellipse cx="80" cy="65" rx="12" ry="18" fill="white" opacity="0.4"/>
  <ellipse cx="85" cy="60" rx="6" ry="10" fill="white" opacity="0.5"/>
  <ellipse cx="110" cy="70" rx="5" ry="8" fill="white" opacity="0.3"/>

  <!-- 果冻里的水果块 -->
  <circle cx="90" cy="80" r="6" fill="#FFD700" opacity="0.9"/>
  <circle cx="115" cy="75" r="5" fill="#32CD32" opacity="0.9"/>
  <circle cx="100" cy="90" r="5" fill="#FF6347" opacity="0.9"/>
  <circle cx="85" cy="95" r="4" fill="#9370DB" opacity="0.9"/>

  <!-- 水果高光 -->
  <circle cx="88" cy="78" r="2" fill="white" opacity="0.5"/>
  <circle cx="113" cy="73" r="1.5" fill="white" opacity="0.5"/>

  <!-- 果冻抖动效果线 -->
  <path d="M 55 75 L 50 70" stroke="#FF1493" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 145 80 L 150 75" stroke="#FF1493" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
