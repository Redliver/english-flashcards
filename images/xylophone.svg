<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  <ellipse cx="100" cy="135" rx="80" ry="12" fill="#90EE90"/>

  <!-- 木琴框架 -->
  <path d="M 40 100 L 60 50 L 140 50 L 160 100" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 木琴音条 -->
  <rect x="55" y="85" width="12" height="25" rx="2" fill="#FF0000"/>
  <rect x="70" y="80" width="12" height="30" rx="2" fill="#FF8C00"/>
  <rect x="85" y="75" width="12" height="35" rx="2" fill="#FFD700"/>
  <rect x="100" y="70" width="12" height="40" rx="2" fill="#32CD32"/>
  <rect x="115" y="75" width="12" height="35" rx="2" fill="#00BFFF"/>
  <rect x="130" y="80" width="12" height="30" rx="2" fill="#9370DB"/>

  <!-- 音条高光 -->
  <rect x="57" y="87" width="3" height="20" rx="1" fill="white" opacity="0.3"/>
  <rect x="72" y="82" width="3" height="24" rx="1" fill="white" opacity="0.3"/>
  <rect x="87" y="77" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
  <rect x="102" y="72" width="3" height="32" rx="1" fill="white" opacity="0.3"/>
  <rect x="117" y="77" width="3" height="28" rx="1" fill="white" opacity="0.3"/>
  <rect x="132" y="82" width="3" height="24" rx="1" fill="white" opacity="0.3"/>

  <!-- 音条固定绳 -->
  <line x1="61" y1="60" x2="139" y2="60" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="61" y1="70" x2="139" y2="70" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round"/>

  <!-- 木琴槌 -->
  <line x1="140" y1="110" x2="170" y2="90" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <circle cx="172" cy="88" r="6" fill="#FF69B4"/>
</svg>
