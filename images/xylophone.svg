<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
 <!-- 背景 -->
 <rect width="200" height="150" fill="#F5F5DC"/>

 <!-- 木架 -->
 <rect x="30" y="90" width="140" height="8" rx="2" fill="#8B4513"/>
 <rect x="35" y="98" width="8" height="40" rx="2" fill="#8B4513"/>
 <rect x="157" y="98" width="8" height="40" rx="2" fill="#8B4513"/>

 <!-- 木槌 -->
 <rect x="145" y="60" width="6" height="40" rx="2" fill="#DEB887"/>
 <circle cx="148" cy="55" r="10" fill="#DC143C"/>
 <circle cx="148" cy="55" r="6" fill="#FF6B6B"/>

 <rect x="50" y="60" width="6" height="40" rx="2" fill="#DEB887"/>
 <circle cx="53" cy="55" r="10" fill="#DC143C"/>
 <circle cx="53" cy="55" r="6" fill="#FF6B6B"/>

 <!-- 木板 - 从长到短 -->
 <rect x="35" y="45" width="130" height="12" rx="2" fill="#FF0000"/>
 <rect x="40" y="58" width="120" height="12" rx="2" fill="#FF7F00"/>
 <rect x="45" y="71" width="110" height="12" rx="2" fill="#FFFF00"/>
 <rect x="50" y="84" width="100" height="12" rx="2" fill="#00FF00"/>

 <!-- 木板高光 -->
 <rect x="37" y="47" width="60" height="4" rx="1" fill="white" opacity="0.3"/>
 <rect x="42" y="60" width="55" height="4" rx="1" fill="white" opacity="0.3"/>
 <rect x="47" y="73" width="50" height="4" rx="1" fill="white" opacity="0.3"/>
 <rect x="52" y="86" width="45" height="4" rx="1" fill="white" opacity="0.3"/>

 <!-- 木板固定螺丝 -->
 <circle cx="50" cy="51" r="3" fill="#C0C0C0"/>
 <circle cx="150" cy="51" r="3" fill="#C0C0C0"/>
 <circle cx="55" cy="64" r="3" fill="#C0C0C0"/>
 <circle cx="145" cy="64" r="3" fill="#C0C0C0"/>
 <circle cx="60" cy="77" r="3" fill="#C0C0C0"/>
 <circle cx="140" cy="77" r="3" fill="#C0C0C0"/>
 <circle cx="65" cy="90" r="3" fill="#C0C0C0"/>
 <circle cx="135" cy="90" r="3" fill="#C0C0C0"/>

 <!-- 音符 -->
 <text x="175" y="50" font-size="24" fill="#333">♪</text>
 <text x="10" y="70" font-size="20" fill="#333">♫</text>
</svg>